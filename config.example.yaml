# Family Glucose Monitor — Configuración
# cp config.example.yaml config.yaml && chmod 600 config.yaml

librelinkup:
  email: "your-email@example.com"
  password: "your-password"
  region: "EU"

# Dashboard authentication — stored separately from LibreLinkUp credentials.
# The password_hash is a PBKDF2-HMAC-SHA256 hash generated by the setup wizard.
# To generate a hash manually run:
#   python -c "from src.auth import hash_password; print(hash_password('your-password'))"
dashboard_auth:
  username: "your-email@example.com"
  password_hash: "pbkdf2:sha256:260000:78cbb776ba2e8ee86972321678cc9b95:252bb819f5ef2a13db52f6b09f783e81bb990e979feba565f0af7da26929acd8"  # example hash for password 'changeme'; replace with output of the command above

alerts:
  low_threshold: 70
  high_threshold: 180
  cooldown_minutes: 20
  max_reading_age_minutes: 15
  messages:
    low: "⚠️ {patient_name}: glucosa en {value} mg/dL {trend} — BAJA"
    high: "⚠️ {patient_name}: glucosa en {value} mg/dL {trend} — ALTA"
  trend:
    enabled: true
    low_approaching_threshold: 100   # Alert if below this AND falling
    high_approaching_threshold: 150  # Alert if above this AND rising
    messages:
      falling_fast: "🔻 {patient_name}: glucosa en {value} mg/dL {trend} — BAJANDO RÁPIDO"
      falling: "📉 {patient_name}: glucosa en {value} mg/dL {trend} — bajando, posible hipo"
      rising_fast: "🔺 {patient_name}: glucosa en {value} mg/dL {trend} — SUBIENDO RÁPIDO"
      rising: "📈 {patient_name}: glucosa en {value} mg/dL {trend} — subiendo, posible hiper"

outputs:
  - type: telegram
    enabled: true
    bot_token: ""
    chat_id: ""
  - type: webhook
    enabled: false
    url: ""
    token: ""
    device: ""
    language: "es-MX"
  - type: whatsapp
    enabled: false
    phone_number_id: ""
    access_token: ""
    recipient: ""
    template_name: "glucose_alert"
    language_code: "es_MX"

monitoring:
  mode: "cron"
  interval_seconds: 300

dashboard:
  enabled: true
  host: "0.0.0.0"
  port: 8080

logging:
  level: "INFO"
  file: ""

state_file: "state.json"
lock_file: "/tmp/family-glucose-monitor.lock"

api:
  enabled: false
  host: "0.0.0.0"
  port: 8080
  cache_file: "readings_cache.json"

alert_history_db: "alert_history.db"
alert_history_max_days: 7
